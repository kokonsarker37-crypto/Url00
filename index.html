<!DOCTYPE html>
<html>
<head>
    <title>URL Redirect</title>
    <script>
        window.onload = function () {
            var url = window.location.href;
            
            if (url === "https://www.facebook.com/profile.php?id=61588486546667") {
                window.location.href = "https://www.facebook.com/profile.php?id=61588486546667";
            } else if (url === "https://www.facebook.com/profile.php?id=61588486546667") {
                window.location.href = "https://www.google.com";
            }
        }
    </script>
</head>
<body>
    <p>If you are not redirected, <a href="https://google.com">click here</a>.</p>
</body>
</html>
